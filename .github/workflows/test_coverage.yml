name: Build And Test Coverage

on:
  pull_request:
    branches: [ develop, main ]

# BEST PRACTICE: Add a concurrency group to cancel old runs on new commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # This job runs first to determine which modules were affected by the changes.
  changed-modules:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*

      - name: Determine changed modules
        id: changes
        run: |
          ALL_MODULES='localDatasource viewModel remoteDatasource domain'
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"

          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/' <<< "$CHANGED_FILES"; then
            echo "Core project file changed. Testing all modules."
            JSON_ARRAY=$(echo $ALL_MODULES | jq -R 'split(" ")' | jq -c '.')
          else
            CHANGED_MODULE_DIRS=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u | uniq)
            FINAL_MODULES=""
            for module in $CHANGED_MODULE_DIRS; do
              if [[ " $ALL_MODULES " =~ " $module " ]]; then
                FINAL_MODULES="$FINAL_MODULES $module"
              fi
            done
            JSON_ARRAY=$(echo "$FINAL_MODULES" | sed 's/^ *//g' | jq -R 'split(" ")' | jq -c '.')
          fi

          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$(echo $JSON_ARRAY | jq -c .)" >> $GITHUB_OUTPUT
            echo "Detected changes in modules: $(echo $JSON_ARRAY)"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
            echo "No changed modules detected."
          fi

  test:
    needs: changed-modules
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changed-modules.outputs.changed_modules) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle

      # FIX: Check if the secrets exist before trying to use them to avoid cryptic errors.
      - name: Load Google Service file
        if: secrets.FIREBASE_JSON != ''
        env:
          DATA: ${{ secrets.FIREBASE_JSON }}
        run: |
          mkdir -p app # Ensure the 'app' directory exists
          echo $DATA | base64 -di > app/google-services.json

      - name: Create local.properties
        if: secrets.API_KEY != ''
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          echo apiKey=\"$API_KEY\" > local.properties
          echo baseUrl=\"$BASE_URL\" >> local.properties
          echo baseImageUrl=\"${{ secrets.BASE_IMAGE_URL }}\" >> local.properties
          echo movieSignUp=\"${{ secrets.REGISTER_URL }}\" >> local.properties
          echo movieResetPassword=\"${{ secrets.RESET_PASSWORD_URL }}\" >> local.properties

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Run Tests and Kover Verification for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:clean :${{ matrix.module }}:koverVerify --build-cache

      - name: Generate coverage report for ${{ matrix.module }}
        run: ./gradlew :${{ matrix.module }}:koverXmlReport
        continue-on-error: true

      - name: Publish Unit Test Results for ${{ matrix.module }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ matrix.module }}/build/test-results/**/*.xml
          comment_title: "📊 ${{ matrix.module }} Test Results"
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true

      - name: Upload Coverage Report for ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.module }}
          # FIX: Be more specific about the report path to avoid uploading unnecessary files.
          path: ${{ matrix.module }}/build/reports/kover/report.xml

  coverage:
    runs-on: ubuntu-latest
    needs: [test, changed-modules]
    # FIX: Run this job 'always()' so it can report on failures, not just success.
    if: always() && needs.changed-modules.outputs.has_changes == 'true'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download All Coverage Reports
        uses: actions/download-artifact@v4
        with:
          # FIX: The pattern should match the upload name.
          pattern: "coverage-report-*"
          path: coverage-reports

      - name: List coverage reports directory
        run: ls -R coverage-reports

      - name: Post Combined Coverage Comment
        uses: mi-kas/kover-report@v1.9
        with:
          # FIX: The glob pattern was incorrect. This recursive glob will find the
          # report.xml file no matter how deep it is inside the downloaded artifact folders.
          path: coverage-reports/**/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🛡️ Total Code Coverage Report"
          update-comment: true
          min-coverage-overall: 80
