name: Build And Test Coverage

on:
  pull_request:
    branches: [ develop, main ]

# Rule 1: Add a concurrency rule to cancel old runs on new commits
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # This job determines which modules were affected by the changes
  changed-modules:
    # ... (this job remains unchanged) ...
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.modules }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*
      - name: Determine changed modules
        id: changes
        run: |
          ALL_MODULES='localDatasource viewModel remoteDatasource domain'
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          if grep -qE '^build.gradle.kts|^settings.gradle.kts|^gradle/|^\.github/' <<< "$CHANGED_FILES"; then
            echo "Core project file changed. Testing all modules."
            JSON_ARRAY=$(echo $ALL_MODULES | jq -R 'split(" ")' | jq -c '.')
          else
            CHANGED_MODULE_DIRS=$(echo "$CHANGED_FILES" | awk -F/ '{print $1}' | sort -u | uniq)
            FINAL_MODULES=""
            for module in $CHANGED_MODULE_DIRS; do
              if [[ " $ALL_MODULES " =~ " $module " ]]; then FINAL_MODULES="$FINAL_MODULES $module"; fi
            done
            JSON_ARRAY=$(echo "$FINAL_MODULES" | sed 's/^ *//g' | jq -R 'split(" ")' | jq -c '.')
          fi
          if [ "$(echo $JSON_ARRAY | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "modules=$JSON_ARRAY" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "modules=[]" >> $GITHUB_OUTPUT
          fi

  test:
    # ... (this job remains unchanged) ...
    needs: changed-modules
    if: needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        module: ${{ fromJSON(needs.changed-modules.outputs.changed_modules) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle
      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew
      - name: Load Google Service file
        env:
          DATA: ${{ secrets.FIREBASE_JSON }}
        run: echo $DATA | base64 -di > app/google-services.json
      - name: Create local.properties
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          echo apiKey=\"$API_KEY\" > local.properties
          echo baseUrl=\"$BASE_URL\" >> local.properties
          echo baseImageUrl=\"${{ secrets.BASE_IMAGE_URL }}\" >> local.properties
          echo movieSignUp=\"${{ secrets.REGISTER_URL }}\" >> local.properties
          echo movieResetPassword=\"${{ secrets.RESET_PASSWORD_URL }}\" >> local.properties
      - name: Clean and Test
        run: ./gradlew :${{ matrix.module }}:clean :${{ matrix.module }}:koverVerify --build-cache
      - name: Generate XML Report
        run: ./gradlew :${{ matrix.module }}:koverXmlReport
        continue-on-error: true
      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ matrix.module }}/build/test-results/**/*.xml
          comment_title: "📊 ${{ matrix.module }} Test Results"
      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-artifacts-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/build/reports/kover/**/*.xml
            ${{ matrix.module }}/build/kover/binary-reports/*.bin

  coverage:
    # ... (this job remains unchanged) ...
    needs: [test, changed-modules]
    if: always() && needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download All Coverage XML Reports
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-artifacts-*"
          path: coverage-reports
      - name: Post Combined Coverage Comment
        uses: mi-kas/kover-report@v1.9
        with:
          path: coverage-reports/**/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "🛡️ Total Code Coverage Report"
          update-comment: true
          min-coverage-overall: 80
          min-coverage-changed-files: 80

  combined-html-report:
    # ... (this job remains unchanged) ...
    needs: [test, changed-modules]
    if: always() && needs.changed-modules.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle
      - run: chmod +x gradlew
      - name: Download all Kover binary reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-artifacts-*
      - name: Generate Combined HTML Report
        run: ./gradlew koverHtmlReport
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'build/reports/kover/html'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2

  # Rule 2: Add this new job to act as a single, final status check
  status-check:
    needs: [test, coverage, combined-html-report]
    runs-on: ubuntu-latest
    # Run this job always, so it can report failure accurately
    if: always()
    steps:
      - name: Report overall status
        run: |
          # Check the results of all upstream jobs
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.coverage.result }}" == "failure" || "${{ needs.combined-html-report.result }}" == "failure" ]]; then
            echo "One or more jobs failed. Failing the status check."
            exit 1
          else
            echo "All jobs passed successfully."
          fi
